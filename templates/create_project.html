{% extends "layout.html" %}

{% block content %}
<div class="timetrack-container">
    <h2>Create New Project</h2>
    
    <form method="POST" action="{{ url_for('projects.create_project') }}" class="project-form">
        <div class="form-row">
            <div class="form-group">
                <label for="name">Project Name *</label>
                <input type="text" id="name" name="name" required 
                       value="{{ request.form.name if request.form.name else '' }}"
                       placeholder="Enter project name">
            </div>
            
            <div class="form-group">
                <label for="code">Project Code *</label>
                <input type="text" id="code" name="code" required 
                       value="{{ request.form.code if request.form.code else '' }}"
                       placeholder="e.g., PRJ001" maxlength="20" style="text-transform: uppercase;">
            </div>
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3" 
                      placeholder="Enter project description">{{ request.form.description if request.form.description else '' }}</textarea>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="team_id">Assigned Team</label>
                <select id="team_id" name="team_id">
                    <option value="">All Teams</option>
                    {% for team in teams %}
                    <option value="{{ team.id }}" 
                            {% if request.form.team_id and request.form.team_id|int == team.id %}selected{% endif %}>
                        {{ team.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="category_id">Project Category</label>
                <select id="category_id" name="category_id">
                    <option value="">No Category</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}" 
                            {% if request.form.category_id and request.form.category_id|int == category.id %}selected{% endif %}>
                        {{ category.icon or '📁' }} {{ category.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="customer_id">Customer</label>
                <select id="customer_id" name="customer_id">
                    <option value="">No Customer</option>
                    {% for customer in customers %}
                    <option value="{{ customer.id }}" 
                            {% if request.form.customer_id and request.form.customer_id|int == customer.id %}selected{% endif %}>
                        {{ customer.name }} ({{ customer.code }})
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="start_date">Start Date</label>
                <input type="date" id="start_date" name="start_date" 
                       value="{{ request.form.start_date if request.form.start_date else '' }}">
            </div>
            
            <div class="form-group">
                <label for="end_date">End Date</label>
                <input type="date" id="end_date" name="end_date" 
                       value="{{ request.form.end_date if request.form.end_date else '' }}">
            </div>
        </div>
        
        <h3 style="margin-top: 2rem; margin-bottom: 1rem;">Billing Configuration</h3>
        
        <div class="form-row">
            <div class="form-group">
                <label for="billing_type">Billing Type *</label>
                <select id="billing_type" name="billing_type" required onchange="toggleBillingRate()">
                    <option value="NON_BILLABLE" {% if request.form.billing_type == 'NON_BILLABLE' %}selected{% endif %}>Non-Billable</option>
                    <option value="HOURLY" {% if request.form.billing_type == 'HOURLY' %}selected{% endif %}>Hourly</option>
                    <option value="DAILY_RATE" {% if request.form.billing_type == 'DAILY_RATE' %}selected{% endif %}>Daily Rate</option>
                    <option value="FIXED_RATE" {% if request.form.billing_type == 'FIXED_RATE' %}selected{% endif %}>Fixed Rate</option>
                </select>
            </div>
            
            <div class="form-group" id="hourly_rate_group">
                <label for="hourly_rate">Hourly Rate ({{ currency }})</label>
                <input type="number" id="hourly_rate" name="hourly_rate" 
                       step="0.01" min="0" max="99999999.99"
                       value="{{ request.form.hourly_rate if request.form.hourly_rate else '' }}"
                       placeholder="0.00">
                <small class="form-text">Currency: {{ currency_symbol }} ({{ currency }})</small>
            </div>
            
            <div class="form-group" id="daily_rate_group" style="display: none;">
                <label for="daily_rate">Daily Rate ({{ currency }})</label>
                <input type="number" id="daily_rate" name="daily_rate" 
                       step="0.01" min="0" max="99999999.99"
                       value="{{ request.form.daily_rate if request.form.daily_rate else '' }}"
                       placeholder="0.00">
                <small class="form-text">Currency: {{ currency_symbol }} ({{ currency }})</small>
            </div>
        </div>
        
        <div class="form-group">
            <label for="billing_notes">Billing Notes</label>
            <textarea id="billing_notes" name="billing_notes" rows="2" 
                      placeholder="Special billing instructions or notes">{{ request.form.billing_notes if request.form.billing_notes else '' }}</textarea>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn">Create Project</button>
            <a href="{{ url_for('projects.admin_projects') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<style>
.project-form {
    max-width: 600px;
    margin: 0 auto;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 500;
    color: #333;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 0.75rem;
    border: 2px solid #e9ecef;
    border-radius: 6px;
    font-size: 1rem;
    transition: border-color 0.2s ease;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #4CAF50;
    box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
}

.form-actions {
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
    margin-top: 2rem;
}

/* Button styles now centralized in main style.css */

#code {
    text-transform: uppercase;
}

.form-text {
    display: block;
    margin-top: 0.25rem;
    font-size: 0.875rem;
    color: #6c757d;
}

h3 {
    color: #333;
    font-size: 1.25rem;
    font-weight: 600;
}
</style>

<script>
// Auto-uppercase project code
document.getElementById('code').addEventListener('input', function(e) {
    e.target.value = e.target.value.toUpperCase();
});

// Toggle rate fields based on billing type
function toggleBillingRate() {
    const billingType = document.getElementById('billing_type').value;
    const hourlyRateGroup = document.getElementById('hourly_rate_group');
    const dailyRateGroup = document.getElementById('daily_rate_group');
    const hourlyRateField = document.getElementById('hourly_rate');
    const dailyRateField = document.getElementById('daily_rate');
    const currency = '{{ currency }}';
    
    // Reset all fields
    hourlyRateField.required = false;
    dailyRateField.required = false;
    hourlyRateGroup.style.display = 'none';
    dailyRateGroup.style.display = 'none';
    
    if (billingType === 'HOURLY') {
        hourlyRateGroup.style.display = 'block';
        hourlyRateField.required = true;
        hourlyRateGroup.querySelector('label').innerHTML = `Hourly Rate (${currency}) *`;
    } else if (billingType === 'DAILY_RATE') {
        dailyRateGroup.style.display = 'block';
        dailyRateField.required = true;
        dailyRateGroup.querySelector('label').innerHTML = `Daily Rate (${currency}) *`;
    } else if (billingType === 'FIXED_RATE') {
        // For fixed rate, we might show hourly rate as optional
        hourlyRateGroup.style.display = 'block';
        hourlyRateGroup.querySelector('label').innerHTML = `Hourly Rate (${currency})`;
    } else {
        // NON_BILLABLE - clear values
        hourlyRateField.value = '';
        dailyRateField.value = '';
    }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    toggleBillingRate();
});
</script>
{% endblock %}
